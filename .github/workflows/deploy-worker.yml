name: Deploy Cloudflare Worker

on:
  push:
    branches: ['main', 'master']
    paths:
      - 'workers/redirector/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: worker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci

      - name: Production prereq/security gate
        run: npm run ops:check-prereqs:production
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          NEXT_PUBLIC_SHORT_DOMAIN: ${{ vars.NEXT_PUBLIC_SHORT_DOMAIN || secrets.NEXT_PUBLIC_SHORT_DOMAIN }}
          RATE_LIMIT_BACKEND: upstash
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CAPTCHA_ENABLED: '1'
          CAPTCHA_SECRET: ${{ secrets.CAPTCHA_SECRET }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY || secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Run worker unit tests
        run: npm run test:worker

      - name: Deploy redirect worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/redirector
          secrets: |
            SUPABASE_URL
            SUPABASE_SECRET_KEY
            SUPABASE_SERVICE_ROLE_KEY
            FALLBACK_URL
          command: deploy
        env:
          SUPABASE_URL: ${{ secrets.WORKER_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.WORKER_SUPABASE_SECRET_KEY || secrets.WORKER_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.WORKER_SUPABASE_SERVICE_ROLE_KEY || secrets.WORKER_SUPABASE_SECRET_KEY }}
          FALLBACK_URL: ${{ secrets.WORKER_FALLBACK_URL }}
