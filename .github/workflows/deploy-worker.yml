name: Deploy Cloudflare Worker

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "workers/redirector/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: worker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy redirect worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/redirector
          secrets: |
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            FALLBACK_URL
          command: deploy
        env:
          SUPABASE_URL: ${{ secrets.WORKER_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.WORKER_SUPABASE_SERVICE_ROLE_KEY }}
          FALLBACK_URL: ${{ secrets.WORKER_FALLBACK_URL }}
