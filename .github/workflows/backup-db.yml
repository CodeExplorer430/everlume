name: Backup Database

on:
  schedule:
    - cron: '17 2 * * *'
    - cron: '5 3 * * 0'
  workflow_dispatch:
    inputs:
      backup_kind:
        description: 'Backup kind'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

concurrency:
  group: db-backup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: 'true'
      BACKUP_PREFIX: ${{ vars.BACKUP_PREFIX || 'everlume/db-backups' }}
      DAILY_RETENTION_DAYS: ${{ vars.DAILY_RETENTION_DAYS || '30' }}
      WEEKLY_RETENTION_WEEKS: ${{ vars.WEEKLY_RETENTION_WEEKS || '12' }}
      BACKUP_KIND_INPUT: ${{ inputs.backup_kind }}
      SCHEDULE_EXPR: ${{ github.event.schedule }}

    steps:
      - uses: actions/checkout@v6

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Resolve backup kind
        id: resolve_kind
        shell: bash
        run: |
          kind="${BACKUP_KIND_INPUT:-}"
          if [[ -z "$kind" ]]; then
            if [[ "${SCHEDULE_EXPR}" == "5 3 * * 0" ]]; then
              kind="weekly"
            else
              kind="daily"
            fi
          fi
          echo "kind=${kind}" >> "$GITHUB_OUTPUT"
          echo "Resolved backup kind: ${kind}"

      - name: Create SQL backup
        id: backup
        env:
          BACKUP_KIND: ${{ steps.resolve_kind.outputs.kind }}
        run: |
          scripts/ops/backup-db.sh /tmp/everlume-backups

      - name: Upload backup to Cloudflare R2
        run: |
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "${{ steps.backup.outputs.backup_gz }}" "s3://${R2_BUCKET}/${{ steps.backup.outputs.object_key }}"
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "${{ steps.backup.outputs.checksum_file }}" "s3://${R2_BUCKET}/${{ steps.backup.outputs.checksum_key }}"
          aws --endpoint-url "$R2_ENDPOINT" s3 cp "${{ steps.backup.outputs.manifest_file }}" "s3://${R2_BUCKET}/${{ steps.backup.outputs.manifest_key }}"

      - name: Enforce retention policy
        run: node scripts/ops/prune-backups.mjs

      - name: Upload backup metadata artifact
        uses: actions/upload-artifact@v6
        with:
          name: backup-metadata-${{ steps.resolve_kind.outputs.kind }}-${{ steps.backup.outputs.timestamp }}
          path: |
            ${{ steps.backup.outputs.checksum_file }}
            ${{ steps.backup.outputs.manifest_file }}
          retention-days: 30

      - name: Send backup failure alert
        if: failure()
        continue-on-error: true
        env:
          OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
          OPS_ALERT_SEVERITY: critical
          OPS_ALERT_SUMMARY: Scheduled database backup workflow failed.
        run: node scripts/ops/send-alert.mjs
