name: Prewarm Cloudinary Media

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 0"

jobs:
  prewarm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
      MEDIA_PREWARM_ENABLED: ${{ vars.MEDIA_PREWARM_ENABLED || '0' }}
      MEDIA_PREWARM_BATCH_SIZE: ${{ vars.MEDIA_PREWARM_BATCH_SIZE || '40' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
      - run: npm ci
      - run: node scripts/ops/prewarm-cloudinary.mjs
