name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  unit_coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload unit coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: test-cloud
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: test-preset
      NEXT_PUBLIC_SHORT_DOMAIN: https://fam.test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck, unit_coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
